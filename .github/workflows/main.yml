name: Build APT repo

on:
  release:
    types: [published]

permissions:
  contents: write
  
jobs:
  repo:
    runs-on: ubuntu-latest

    steps:
      - name: Install tools
        run: |
          sudo apt update
          sudo apt install -y aptly gnupg

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          submodules: recursive

      - name: Import GPG key
        run: |
          echo "${{ secrets.APT_GPG_PRIVATE_KEY }}" | \
            gpg --batch --yes --pinentry-mode loopback --import
          gpg --list-secret-keys --keyid-format LONG

      - name: Download release packages
        run: |
          mkdir debs
          gh release download ${{ github.event.release.tag_name }} \
            --pattern "*.deb" \
            --dir debs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Init aptly
        run: |
          mkdir -p ~/.aptly

      - name: Create repo
        run: |
          aptly repo create \
            -distribution=stable \
            -component=main \
            sigar || true

      - name: Add packages
        run: |
          aptly repo add sigar debs

      - name: Publish signed repo
        run: |
          aptly publish repo \
            -distribution=stable \
            -gpg-key="${{ secrets.APT_GPG_KEY_ID }}" \
            -architectures=amd64 \
            sigar

      - name: Prepare site
        run: |
          mkdir public
          cp -r ~/.aptly/public/* public/

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
